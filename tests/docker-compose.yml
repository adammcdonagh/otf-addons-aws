version: "3.8"

services:
  floci:
    image: floci/floci:latest
    restart: always
    container_name: floci
    ports:
      - "4566:4566"
    environment:
      - FLOCI_HOSTNAME=floci
      - FLOCI_SERVICES_LAMBDA_DOCKER_NETWORK=floci-net
    volumes:
      - "./volume:/app/data"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - floci-net

networks:
  floci-net:
    name: floci-net
